name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          ADCB33: ${{ secrets.ADCB33 }}
          B8E85F: ${{ secrets.B8E85F }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('ADCB33', '')
          env_b = os.environ.get('B8E85F', '')
          modified = 0
          for doc in pathlib.Path('_site').rglob('*.html'):
              try:
                  body = doc.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = body
              if env_a:
                  result = result.replace('<!-- 5f30b219ffd1633d61ee1b -->', env_a)
              if env_b:
                  result = result.replace('<!-- e637165601a0445f65569226 -->', env_b)
              if result != body:
                  doc.write_text(result, encoding='utf-8')
                  modified += 1
          if modified == 0 and (env_a or env_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
